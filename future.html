<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Events</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .box{
            margin: 10px;
            padding: 20px;
            border: 2px solid #07f91b;
            color: #ffffff;
            border-radius: 10px;
            text-align: center;
            font-size: 30px;
        }
        #fut{
            background-image: url(bubbles.gif);
            
        }
        #futu{
            background-image: url(https://c.tenor.com/Ej0i11AkcawAAAAC/waiting-time.gif);
            background-repeat: no-repeat;
            background-size: cover;
        }
        #futu:hover{
            background-image: none;
            background: green;
        }
    </style>
</head>
<body>
    <h1 id="fut">Welcome to the Future</h1>
    <div class="box">
    <div id="futureContent"></div>
</div>
    <button id="futu" onclick="window.location.href='index.html'"> Travel Again!</button>
    
    <script src="Future_script.js"></script>
</body>
</html>
