<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Travel Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=48327&format=png&color=000000">
</head>
<body>
    <center>
        <div class="container">
            <h1 id="pre">TIME TRAVEL MACHINE</h1>
        <input type="number" id="yearInput" placeholder="Enter Year (1900-2050)">
        <br>
        <button id="travelButton">Travel</button>
        
        <!-- Loading Animation -->
        <div id="loading" class="hidden">
            <img src="Earth.gif" alt="Loading..." class="loading-img earth-img">
            <p>Traveling through time...</p>
        </div>
    </div>
    
    <audio id="travelSound" src="travel.wav"></audio>
    </center> 
    <script src="script.js"></script>
    <script src="times1.js"></script>
    <hr>
    <footer>@2025 Time Travel Machine. <a href="info.html">ABOUT US</a></footer>
</body>
</html>
